services:
  app:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    volumes:
      - /app/node_modules # Anonymous volume prevents host node_modules from overwriting container dependencies
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: package.json
    environment:
      - CHOKIDAR_USEPOLLING=true
    image: voice-cleanup:dev
