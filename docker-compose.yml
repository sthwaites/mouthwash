services:
  app:
    build:
      context: .
      target: development
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - dist/
        - action: rebuild
          path: package.json
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps with file watching on some systems
    image: voice-cleanup:dev
