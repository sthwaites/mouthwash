<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" /> <!-- Blue-400 -->
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" /> <!-- Purple-500 -->
    </linearGradient>
  </defs>
  
  <!-- Bottle Body -->
  <rect x="25" y="30" width="50" height="60" rx="8" ry="8" fill="url(#grad1)" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Bottle Neck -->
  <rect x="40" y="15" width="20" height="15" fill="#e2e8f0" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Cap -->
  <rect x="35" y="5" width="30" height="12" rx="2" ry="2" fill="#334155" stroke="#1e293b" stroke-width="2"/>
  
  <!-- Liquid Level (lighter top) -->
  <path d="M26 40 Q 50 45 74 40 L 74 89 L 26 89 Z" fill="rgba(255,255,255,0.2)"/>

  <!-- Label -->
  <rect x="35" y="50" width="30" height="25" rx="2" ry="2" fill="#ffffff" stroke="#1e293b" stroke-width="1"/>
  <!-- Tooth/Sparkle on label -->
   <path d="M50 55 L52 60 L57 60 L53 64 L55 69 L50 66 L45 69 L47 64 L43 60 L48 60 Z" fill="#60a5fa"/>

  <!-- Bubbles -->
  <circle cx="40" cy="75" r="2" fill="white" opacity="0.6"/>
  <circle cx="60" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="50" cy="85" r="1" fill="white" opacity="0.6"/>

</svg>